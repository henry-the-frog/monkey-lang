name: Deploy Playground to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'playground/**'
      - 'src/wasm-compiler.js'
      - 'src/wasm.js'
      - 'src/lexer.js'
      - 'src/parser.js'
      - 'src/ast.js'
      - '.github/workflows/deploy-playground.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bundle compiler for browser
        run: npx esbuild playground/bundle-entry.js --bundle --format=esm --outfile=playground/monkey-compiler.js

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
